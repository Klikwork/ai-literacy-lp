<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #020a18;
    font-family: 'Roboto', Helvetica, Arial, sans-serif;
    color: #fff;
    display: flex;
    align-items: center;
  }
  .bg-glow {
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(255,85,0,0.18) 0%, transparent 65%);
    pointer-events: none;
  }
  .content {
    position: relative;
    z-index: 1;
    padding: 64px 72px;
    flex: 1;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,85,0,0.12);
    border: 1px solid rgba(255,85,0,0.25);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #ff5500;
    margin-bottom: 32px;
  }
  .badge::before {
    content: '';
    display: block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ff5500;
  }
  h1 {
    font-size: 72px;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
  }
  h1 span { color: #ff5500; }
  p {
    font-size: 20px;
    color: #8b98b0;
    line-height: 1.5;
    max-width: 480px;
    margin-bottom: 36px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 40px;
    padding-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .logo img { height: 28px; }
  .certificate-wrap {
    position: relative;
    flex-shrink: 0;
    padding: 48px 64px 48px 0;
  }
  .certificate-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,85,0,0.15) 0%, transparent 70%);
  }
  .certificate-wrap img {
    position: relative;
    width: 260px;
    border-radius: 12px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    transform: rotate(3deg);
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-glow"></div>

  <div class="content">
    <div class="badge">EU AI Act · Article 4</div>
    <h1>AI literacy for<br>recruiters. <span>Certified.</span></h1>
    <p>30 minutes. One certificate. Proof you understand AI, GDPR, and your legal obligations.</p>
    <div class="logo">
      <img src="./klikwork-brand/klikwork-brand/assets/logos/white/full.png" alt="Klikwork" />
    </div>
  </div>

  <div class="certificate-wrap">
    <div class="certificate-glow"></div>
    <img src="./certificate.png" alt="Certificate" />
  </div>
</body>
</html>
