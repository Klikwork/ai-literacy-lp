<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>AI Literacy for Recruiters — Certified Training by Klikwork</title>
    <meta name="description" content="Provably AI literate in 30 minutes. The EU AI Act obligation already applies; enforcement starts 2 August 2026. Three modules, one exam, an official certificate shareable on LinkedIn. By Klikwork BV." />
    <link rel="canonical" href="https://ailiteracyforrecruiters.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Fonts: preconnect + stylesheet beats CSS @import (removes a blocking request chain) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />

    <!-- Open Graph (LinkedIn, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ailiteracyforrecruiters.com" />
    <meta property="og:title" content="AI Literacy for Recruiters — Certified Training by Klikwork" />
    <meta property="og:description" content="Provably AI literate in 30 minutes. Enforcement starts 2 August 2026. Official certificate you can share on LinkedIn today." />
    <meta property="og:image" content="https://ailiteracyforrecruiters.com/og-image.png" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:site_name" content="AI Literacy for Recruiters" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Literacy for Recruiters — Certified Training by Klikwork" />
    <meta name="twitter:description" content="Provably AI literate in 30 minutes. Enforcement starts 2 August 2026. Official certificate you can share on LinkedIn today." />
    <meta name="twitter:image" content="https://ailiteracyforrecruiters.com/og-image.png" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Klikwork BV",
      "url": "https://klikwork.com",
      "logo": "https://ailiteracyforrecruiters.com/klikwork-brand/klikwork-brand/assets/logos/white/full.png",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Assendorperdijk 1",
        "addressLocality": "Zwolle",
        "postalCode": "8012 EG",
        "addressCountry": "NL"
      },
      "sameAs": ["https://klikwork.com"]
    }
    </script>

    <!-- Structured Data: Course -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Course",
      "name": "AI Literacy for Recruiters",
      "description": "A 30-minute self-paced online training for recruiters covering AI fundamentals, bias and ethics, GDPR, and EU AI Act Article 4 compliance. Includes a 10-question knowledge test and a digital certificate on passing.",
      "url": "https://ailiteracyforrecruiters.com",
      "provider": {
        "@type": "Organization",
        "name": "Klikwork BV",
        "url": "https://klikwork.com"
      },
      "educationalCredentialAwarded": "AI Literacy Certificate — EU AI Act Article 4 compliant",
      "timeRequired": "PT30M",
      "inLanguage": "en",
      "hasCourseInstance": {
        "@type": "CourseInstance",
        "courseMode": "online",
        "courseWorkload": "PT30M"
      },
      "offers": {
        "@type": "Offer",
        "price": "47",
        "priceCurrency": "EUR",
        "availability": "https://schema.org/InStock",
        "url": "https://ailiteracyforrecruiters.com/#pricing"
      },
      "about": [
        { "@type": "Thing", "name": "Artificial Intelligence" },
        { "@type": "Thing", "name": "EU AI Act" },
        { "@type": "Thing", "name": "GDPR" },
        { "@type": "Thing", "name": "AI literacy" },
        { "@type": "Thing", "name": "Recruitment" }
      ]
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How long does the AI literacy training take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "30 minutes total across three modules. You can complete it in one sitting or spread it across multiple sessions."
          }
        },
        {
          "@type": "Question",
          "name": "What happens after I pay for the training?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You receive an email within a few minutes with your personal access link. Click it and you can start immediately. No account creation required."
          }
        },
        {
          "@type": "Question",
          "name": "What score do I need to pass the AI literacy test?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "8 out of 10 on the knowledge test. If you do not pass the first time, you can retry as many times as you need. There is no penalty for retrying."
          }
        },
        {
          "@type": "Question",
          "name": "Is the AI literacy certificate recognised under the EU AI Act?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The certificate demonstrates AI literacy as required under Article 4 of the EU AI Act. It is issued by Klikwork BV and includes a public verification link you can share with your employer. It is valid for one year."
          }
        },
        {
          "@type": "Question",
          "name": "Can I buy AI literacy licenses for my whole recruitment team?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Teams of 10 or more get seat pricing: 37 euro per seat for 10 to 24 seats, 27 euro per seat for 25 or more, and you can order on invoice or request a quote first. You automatically receive a dashboard where you can invite your team members. Each person gets their own magic link, completes the training independently, and receives their own certificate on passing."
          }
        },
        {
          "@type": "Question",
          "name": "Can I do the AI literacy training on my phone?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The training works on any device — desktop, tablet, or mobile. Watch the modules and complete the test wherever it suits you."
          }
        },
        {
          "@type": "Question",
          "name": "Are subtitles available in the training videos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. All three video modules include subtitles so you can follow along in any environment, with or without sound."
          }
        },
        {
          "@type": "Question",
          "name": "In what language is the AI literacy training?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "English. The training is designed for international recruitment professionals and uses straightforward business English throughout."
          }
        }
      ]
    }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
